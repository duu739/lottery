<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動主控台 - 歡樂抽獎</title>
    <style>
        /* --- 專屬莫蘭迪配色 --- */
        :root {
            --c-red: #F05C5D;
            --c-red-shade: #D33D3E;
            --c-red-tint: #F58C8C;
            --c-teal: #336B87; 
            --c-teal-shade: #1F4A60;
            --c-beige: #EAD2B6;
            --c-beige-tint: #F4E8DB;
            --c-blue: #709CB5;
        }

        body {
            font-family: '微軟正黑體', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--c-teal-shade) 0%, var(--c-teal) 100%);
            color: var(--c-beige-tint);
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }

        h1 { margin: 0; font-size: 2.5rem; color: var(--c-beige); text-shadow: 0 0 10px rgba(234, 210, 182, 0.3); }
        
        .btn-primary { background-color: var(--c-beige); color: var(--c-teal-shade); border: none; padding: 15px 40px; font-size: 1.5rem; border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 0 15px rgba(234, 210, 182, 0.4); transition: all 0.2s; }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(234, 210, 182, 0.8); }
        .btn-secondary { background-color: var(--c-blue); color: white; border: none; padding: 10px 20px; font-size: 1rem; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .btn-secondary:hover { background-color: var(--c-beige); color: var(--c-teal-shade); }
        .btn-danger { background-color: transparent; color: var(--c-red-tint); border: 2px solid var(--c-red-shade); padding: 10px 20px; font-size: 1rem; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-weight: bold; }
        .btn-danger:hover { background-color: var(--c-red); color: white; border-color: var(--c-red); box-shadow: 0 0 15px rgba(240, 92, 93, 0.5); }

        /* --- 基礎介面 --- */
        #setupScreen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; text-align: center; }
        .setup-card { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(234, 210, 182, 0.2); }
        .setup-card input { font-size: 2rem; padding: 10px; text-align: center; width: 200px; margin: 20px 0; border-radius: 10px; border: 2px solid var(--c-blue); background: rgba(0,0,0,0.3); color: white; }

        #dashboardScreen { display: none; }
        .header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(255, 255, 255, 0.1); padding-bottom: 20px; margin-bottom: 30px; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .room-badge { background: var(--c-red); color: white; padding: 5px 15px; border-radius: 20px; font-size: 1.2rem; font-weight: bold; margin-left: 15px; }
        .status-bar { display: flex; align-items: center; gap: 15px; }
        .counter { font-size: 1.2rem; background: rgba(255, 255, 255, 0.1); padding: 10px 20px; border-radius: 30px; }
        .counter span { color: var(--c-teal-shade); background: var(--c-beige); padding: 2px 12px; border-radius: 20px; font-weight: bold; margin-left: 10px; }
        
        .draw-controls { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(112, 156, 181, 0.3); padding: 20px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .draw-controls input { width: 80px; padding: 10px; font-size: 1.2rem; text-align: center; border-radius: 8px; border: 2px solid var(--c-blue); background: rgba(255,255,255,0.1); color: white; outline: none; }
        
        #winnerArea { min-height: 150px; margin-bottom: 40px; text-align: center; display: none; }
        #winnerArea h2 { color: var(--c-beige); font-size: 2rem; margin-bottom: 20px; text-shadow: 0 0 10px rgba(234, 210, 182, 0.4); }
        /* 下方名單牆變灰色，表示已中獎 */
        .name-card.drawn { opacity: 0.2; filter: grayscale(100%); }
        
        #winnerGrid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        
        .section-title { border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 20px; color: var(--c-blue); }
        #nameGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .name-card { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(234, 210, 182, 0.2); border-radius: 8px; padding: 15px; text-align: center; font-size: 1.2rem; transition: opacity 0.5s; }
        .name-card.drawn { opacity: 0.2; filter: grayscale(100%); }

        @keyframes zoomIn { 0% { opacity: 0; transform: scale(0.1) translateY(-50px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }

        /* ✨✨✨ 數位老虎機動畫特效區 ✨✨✨ */
        #slotOverlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(31, 74, 96, 0.95);
            backdrop-filter: blur(8px); z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 👑 ✨ 新增：上方保留中獎者的展示區 ✨ */
        #slotRealtimeWinnerArea {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin-bottom: 30px; max-width: 90%;
        }
        #slotRealtimeWinnerTag {
            margin-bottom: 15px; font-size: 1.5rem; color: var(--c-beige); font-weight: bold;
            letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(90deg, transparent, rgba(234, 210, 182, 0.1), transparent);
            padding: 10px 20px; border-radius: 20px;
            display: inline-flex; align-items: center; gap: 8px;
        }
        #slotRealtimeWinnerFrame {
            background: rgba(255, 255, 255, 0.03); padding: 30px; border-radius: 20px;
            border: 2px solid var(--c-blue); box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        #slotRealtimeWinnerArea .slot-window {
            width: 400px; height: 120px;
            background: rgba(0, 0, 0, 0.5); /* 內凹深色視窗 */
            border-radius: 12px; border: 3px solid var(--c-teal-shade);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        #slotName {
            font-size: 3.5rem; font-weight: bold; color: var(--c-beige);
            text-shadow: 0 0 15px rgba(234, 210, 182, 0.4);
            white-space: nowrap;
        }

        /* 清晰但帶有微弱跳動的動畫 (0.2秒節奏)，改在上方框框進行 */
        #slotRealtimeWinnerArea .spinning-text { 
            animation: tickFlip 0.2s infinite ease-in-out; 
        }
        @keyframes tickFlip { 
            0% { transform: translateY(2px) scale(0.98); color: var(--c-blue); opacity: 0.8; } 
            50% { transform: translateY(-2px) scale(1.02); color: var(--c-beige); opacity: 1; } 
            100% { transform: translateY(2px) scale(0.98); color: var(--c-blue); opacity: 0.8; } 
        }

        /* 中獎定格時的爆紅放大特效，改在上方框框進行 */
        #slotRealtimeWinnerArea .winner-pop {
            color: var(--c-red) !important;
            text-shadow: 0 0 30px var(--c-red-shade) !important;
            animation: popScale 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popScale { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1.2); opacity: 1; } }

        /* 更新過場動畫佈局 */
        #dashboardScreen, #lotteryOverlay, #slotOverlay { display: none; flex-direction: column; }
        
        #slotCountLabel {
            margin-bottom: 20px; font-size: 1.5rem; color: var(--c-beige); font-weight: bold;
            letter-spacing: 2px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="slotOverlay">
        <div id="slotRealtimeWinnerArea">
            <div id="slotRealtimeWinnerTag">🏆 即時中獎區 🏆</div>
            <div id="slotRealtimeWinnerFrame">
                <div class="slot-window">
                    <div id="slotName">???</div>
                </div>
            </div>
        </div>
        <div id="slotCountLabel">幸運輪盤載入中...</div>
    </div>

    <div id="setupScreen">
        <div class="setup-card">
            <h1 style="margin-bottom: 20px;">建立或加入活動</h1>
            <p>請輸入自訂的活動代碼 (英文或數字)，<br>或直接點擊建立隨機代碼。</p>
            <input type="text" id="roomInput" placeholder="例如: 8888" maxlength="10">
            <br>
            <button class="btn-primary" onclick="enterRoom()">進入活動控台</button>
            <div style="margin-top: 20px;">
                <button class="btn-secondary" onclick="generateRandomRoom()">🎲 產生隨機代碼</button>
            </div>
        </div>
    </div>

    <div id="dashboardScreen">
        <div class="header-container">
            <div class="header-left">
                <button class="btn-secondary" onclick="returnToLobby()">⬅️ 返回大廳</button>
                <h1>🎉 歡樂大抽獎 <span class="room-badge" id="displayRoomCode">代碼: 載入中</span></h1>
            </div>
            <div class="status-bar">
                <div class="counter">總人數<span id="totalCount">0</span></div>
                <button class="btn-secondary" onclick="exportToCSV()">下載名單 (CSV)</button>
                <button class="btn-danger" onclick="deleteRoom()">🗑️ 刪除活動</button>
            </div>
        </div>

        <div class="draw-controls">
            <label style="font-size: 1.2rem; font-weight: bold; color: var(--c-beige);">一次抽出：</label>
            <input type="number" id="drawCount" value="1" min="1">
            <label style="font-size: 1.2rem; font-weight: bold; color: var(--c-beige);">人</label>
            <button class="btn-primary" id="drawBtn">🎁 開始抽獎</button>
            <button class="btn-secondary" id="resetBtn" style="margin-left: auto;">清空本輪中獎紀錄</button>
        </div>

        <div id="winnerArea">
            <h2>✨ 恭喜本次中獎幸運兒 ✨</h2>
            <div id="winnerGrid"></div>
        </div>

        <h3 class="section-title">目前參與名單牆</h3>
        <div id="nameGrid"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // ⚠️⚠️⚠️ 請在此替換成你的 firebaseConfig ⚠️⚠️⚠️
        const firebaseConfig = {
            apiKey: "AIzaSyAFDgexiZg7b3V99OKD8kMN-AX0VnE3Zbk",
            authDomain: "lottery-cd2d6.firebaseapp.com",
            databaseURL: "https://lottery-cd2d6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lottery-cd2d6",
            storageBucket: "lottery-cd2d6.firebasestorage.app",
            messagingSenderId: "424550291907",
            appId: "1:424550291907:web:d53de4e7b528a0d3d80576"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentRoom = "";
        let participantsData = []; 
        let drawnWinners = [];     
        let cardElements = {};   
        
        let animationDisplayIndex = 0;  

        const urlParams = new URLSearchParams(window.location.search);
        const roomFromUrl = urlParams.get('room');

        if (roomFromUrl) startDashboard(roomFromUrl);

        function enterRoom() {
            const roomCode = document.getElementById('roomInput').value.trim();
            if(!roomCode) return alert("請輸入活動代碼！");
            window.location.href = `?room=${roomCode}`;
        }
        function generateRandomRoom() { window.location.href = `?room=${Math.floor(100000 + Math.random() * 900000)}`; }
        function returnToLobby() { if(confirm("確定返回大廳嗎？")) window.location.href = window.location.pathname; }

        function deleteRoom() {
            if(confirm(`⚠️ 確定要永久刪除活動「${currentRoom}」及所有名單嗎？\n資料將無法復原！`)) {
                db.ref(`events/${currentRoom}`).remove().then(() => {
                    alert("✅ 活動已成功刪除！"); window.location.href = window.location.pathname;
                });
            }
        }

        function startDashboard(roomCode) {
            currentRoom = roomCode;
            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('dashboardScreen').style.display = 'block';
            document.getElementById('displayRoomCode').innerText = `代碼: ${roomCode}`;

            const eventRef = db.ref(`events/${currentRoom}/participants`);

            eventRef.on("child_added", function(snapshot) {
                const name = snapshot.val().name;
                participantsData.push(name);
                document.getElementById('totalCount').innerText = participantsData.length;

                const card = document.createElement("div");
                card.className = "name-card";
                card.innerText = name;
                cardElements[name] = card; 
                document.getElementById('nameGrid').appendChild(card);
            });
            
            eventRef.on("child_removed", function(snapshot) {
                const name = snapshot.val().name;
                if(cardElements[name]) { cardElements[name].remove(); delete cardElements[name]; }
            });
        }

        // --- 老虎機動畫核心邏輯 ---
        document.getElementById('drawBtn').addEventListener('click', function() {
            const drawCount = parseInt(document.getElementById('drawCount').value);
            const eligiblePool = participantsData.filter(name => !drawnWinners.includes(name));

            if (eligiblePool.length === 0) return alert("所有人都已經被抽中過囉！");
            if (drawCount > eligiblePool.length) return alert(`目前只剩下 ${eligiblePool.length} 人符合資格！`);

            const displayPool = [...eligiblePool];

            let currentWinners = [];
            for (let i = 0; i < drawCount; i++) {
                const randomIndex = Math.floor(Math.random() * eligiblePool.length);
                const winnerName = eligiblePool.splice(randomIndex, 1)[0];
                currentWinners.push(winnerName);
                drawnWinners.push(winnerName);
            }

            playSlotAnimation(currentWinners, displayPool);
        });

        function playSlotAnimation(winnersList, displayPool) {
            const overlay = document.getElementById('slotOverlay');
            const slotName = document.getElementById('slotName');
            const label = document.getElementById('slotCountLabel');
            const drawBtn = document.getElementById('drawBtn');
            const realtimeWinnersContainer = document.getElementById('slotRealtimeWinners');

            drawBtn.disabled = true;
            overlay.style.display = 'flex';
            // ✨ 取消了抽出多個小卡片在下方顯示的邏輯 ✨

            let currentWinnerIndex = 0;

            function spinForOneWinner() {
                if (currentWinnerIndex >= winnersList.length) {
                    label.innerText = `🎉 恭喜以上幸運兒！`; // 全部抽完改標題
                    // 抽完最後一個，畫面多停留 1.5 秒直接收合
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        updateMainUI(winnersList);
                        drawBtn.disabled = false;
                    }, 1500); 
                    return;
                }

                if (winnersList.length > 1) {
                    label.innerText = `🎰 正在抽出第 ${currentWinnerIndex + 1} 位幸運兒...`;
                } else {
                    label.innerText = `🎰 幸運輪盤轉動中...`;
                }

                // ✨ 在上方的框框進行滾動 ✨
                slotName.className = 'spinning-text';
                
                let spinCount = 0;
                const maxSpins = 25; // 轉 5 秒 (25次 * 0.2秒)

                // 每 200 毫秒 (0.2秒) 切換一次，且按順序接續顯示
                let spinInterval = setInterval(() => {
                    const currentShowName = displayPool[animationDisplayIndex % displayPool.length];
                    slotName.innerText = currentShowName;
                    
                    // 索引加一，下一次輪播就會接續下一個人
                    animationDisplayIndex++;
                    spinCount++;

                    // 達到 5 秒後停止
                    if (spinCount >= maxSpins) {
                        clearInterval(spinInterval); // 停止轉動
                        
                        // ✨ 在上方的框框中獎爆紅特效 ✨
                        slotName.className = 'winner-pop';
                        slotName.innerText = winnersList[currentWinnerIndex]; // 顯示真正的得獎者

                        // 定格 1.5 秒讓大家歡呼，然後進入下一個人的抽獎 (或結束)
                        setTimeout(() => {
                            currentWinnerIndex++;
                            spinForOneWinner();
                        }, 1500);
                    }
                }, 200); // <-- 0.2 秒的清晰節奏
            }

            // 啟動遞迴迴圈
            spinForOneWinner();
        }

        // 把結果更新到背後的大螢幕
        function updateMainUI(newWinners) {
            // ✨ 不需要再顯示最新一輪的中獎者卡片 ✨
            document.getElementById('winnerArea').style.display = "block";

            // 下方名單牆變暗，表示已中獎
            newWinners.forEach(name => {
                if(cardElements[name]) cardElements[name].classList.add("drawn");
            });
        }

        document.getElementById('resetBtn').addEventListener('click', function() {
            if(confirm("確定要清空『已中獎紀錄』嗎？")) {
                drawnWinners = [];
                document.getElementById('winnerArea').style.display = "none";
                for (let key in cardElements) cardElements[key].classList.remove("drawn");
            }
        });

        function exportToCSV() {
            if (participantsData.length === 0) return alert("目前還沒有人報名喔！");
            let csvContent = "\uFEFF報名序號,姓名\n"; 
            participantsData.forEach((name, index) => csvContent += `${index + 1},${name}\n`);
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `報名名單_${currentRoom}.csv`; 
            link.click();
        }
    </script>
</body>
</html>
