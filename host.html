<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動主控台 - 歡樂抽獎</title>
    <style>
        body {
            font-family: '微軟正黑體', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #ffffff;
            margin: 0;
            padding: 40px;
            min-height: 100vh;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 2.5rem; color: #e94560; text-shadow: 0 0 10px rgba(233, 69, 96, 0.5); }

        .status-bar { display: flex; align-items: center; gap: 15px; }

        .counter {
            font-size: 1.2rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
        }
        .counter span { color: #0f3460; background: #4ecca3; padding: 2px 12px; border-radius: 20px; font-weight: bold; margin-left: 10px; }

        /* --- 抽獎控制區 --- */
        .draw-controls {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(78, 204, 163, 0.3);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .draw-controls label { font-size: 1.2rem; font-weight: bold; }
        
        .draw-controls input {
            width: 80px;
            padding: 10px;
            font-size: 1.2rem;
            text-align: center;
            border-radius: 8px;
            border: 2px solid #4ecca3;
            background: rgba(255,255,255,0.1);
            color: white;
            outline: none;
        }

        .btn-primary {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.5);
            transition: all 0.2s;
        }
        .btn-primary:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(233, 69, 96, 0.8); }
        .btn-primary:active { transform: scale(0.95); }

        .btn-secondary {
            background-color: #0f3460;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-secondary:hover { background-color: #4ecca3; color: #0f3460; }

        /* --- 中獎名單展示區 --- */
        #winnerArea {
            min-height: 150px;
            margin-bottom: 40px;
            text-align: center;
            display: none; /* 預設隱藏，有中獎才顯示 */
        }
        #winnerArea h2 { color: #f9a826; font-size: 2rem; margin-bottom: 20px; text-shadow: 0 0 10px rgba(249, 168, 38, 0.5); }
        
        #winnerGrid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .winner-card {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: #1a1a2e;
            padding: 20px 40px;
            font-size: 2.5rem;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), 0 0 20px rgba(249, 168, 38, 0.5);
            animation: zoomIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes zoomIn {
            0% { opacity: 0; transform: scale(0.1) translateY(-50px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- 所有人名單牆 --- */
        .section-title { border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; margin-bottom: 20px; color: #a0aab2; }
        
        #nameGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .name-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            animation: popIn 0.5s ease forwards;
            opacity: 0;
        }
        /* 被抽中後，在名單牆上變暗的樣式 */
        .name-card.drawn { opacity: 0.3; filter: grayscale(100%); }

        @keyframes popIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>🎉 歡樂大抽獎</h1>
        <div class="status-bar">
            <div class="counter">總報名人數<span id="totalCount">0</span></div>
            <button class="btn-secondary" onclick="exportToCSV()">下載名單 (CSV)</button>
        </div>
    </div>

    <div class="draw-controls">
        <label for="drawCount">一次抽出：</label>
        <input type="number" id="drawCount" value="1" min="1">
        <label>人</label>
        <button class="btn-primary" id="drawBtn">🎁 開始抽獎</button>
        <button class="btn-secondary" id="resetBtn" style="margin-left: auto;">清空本輪中獎紀錄</button>
    </div>

    <div id="winnerArea">
        <h2>✨ 恭喜本次中獎幸運兒 ✨</h2>
        <div id="winnerGrid"></div>
    </div>

    <h3 class="section-title">目前參與名單牆</h3>
    <div id="nameGrid"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // ⚠️⚠️⚠️ 請在此替換成你的 firebaseConfig ⚠️⚠️⚠️
        const firebaseConfig = {
            apiKey: "AIzaSyAFDgexiZg7b3V99OKD8kMN-AX0VnE3Zbk",
            authDomain: "lottery-cd2d6.firebaseapp.com",
            databaseURL: "https://lottery-cd2d6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lottery-cd2d6",
            storageBucket: "lottery-cd2d6.firebasestorage.app",
            messagingSenderId: "424550291907",
            appId: "1:424550291907:web:d53de4e7b528a0d3d80576"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const nameGrid = document.getElementById('nameGrid');
        const totalCountEl = document.getElementById('totalCount');
        const winnerArea = document.getElementById('winnerArea');
        const winnerGrid = document.getElementById('winnerGrid');
        const drawBtn = document.getElementById('drawBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        let participantsData = []; // 存所有人名字
        let drawnWinners = [];     // 存已經中過獎的人
        let cardElements = {};     // 儲存畫面上的卡片元素，方便改變樣式

        // 1. 監聽資料庫，即時渲染名單牆
        db.ref("participants").on("child_added", function(snapshot) {
            const data = snapshot.val();
            const name = data.name;

            participantsData.push(name);
            totalCountEl.innerText = participantsData.length;

            const card = document.createElement("div");
            card.className = "name-card";
            card.innerText = name;
            cardElements[name] = card; // 記住這張卡片
            nameGrid.appendChild(card);
        });

        // 2. 抽獎核心邏輯
        drawBtn.addEventListener('click', function() {
            const drawCount = parseInt(document.getElementById('drawCount').value);
            
            // 過濾出「還沒中過獎」的人建立抽獎池
            const eligiblePool = participantsData.filter(name => !drawnWinners.includes(name));

            if (eligiblePool.length === 0) {
                alert("所有人都已經被抽中過囉！");
                return;
            }
            if (drawCount > eligiblePool.length) {
                alert(`目前只剩下 ${eligiblePool.length} 人符合資格，請修改抽出人數！`);
                return;
            }

            // 清空上一輪畫面上的開獎結果
            winnerGrid.innerHTML = "";
            winnerArea.style.display = "block";

            // 進行亂數抽取
            for (let i = 0; i < drawCount; i++) {
                // 從池子裡隨機挑一個索引
                const randomIndex = Math.floor(Math.random() * eligiblePool.length);
                // 把幸運兒拿出來，並從池子裡移除 (splice)
                const winnerName = eligiblePool.splice(randomIndex, 1)[0];
                
                // 加到已中獎名單
                drawnWinners.push(winnerName);

                // 產生金光閃閃的開獎卡片
                const wCard = document.createElement("div");
                wCard.className = "winner-card";
                wCard.innerText = winnerName;
                winnerGrid.appendChild(wCard);

                // 將下方名單牆的對應卡片變暗，表示已中獎
                if(cardElements[winnerName]) {
                    cardElements[winnerName].classList.add("drawn");
                }
            }
        });

        // 3. 重置中獎名單
        resetBtn.addEventListener('click', function() {
            if(confirm("確定要清空『已中獎紀錄』嗎？這樣大家又可以重新被抽到了喔！")) {
                drawnWinners = [];
                winnerArea.style.display = "none";
                winnerGrid.innerHTML = "";
                // 把名單牆變暗的卡片全數恢復
                for (let key in cardElements) {
                    cardElements[key].classList.remove("drawn");
                }
                alert("中獎紀錄已清空！");
            }
        });

        // 4. 匯出 CSV (包含所有人)
        function exportToCSV() {
            if (participantsData.length === 0) {
                alert("目前還沒有人報名喔！");
                return;
            }
            let csvContent = "\uFEFF報名序號,姓名\n"; 
            participantsData.forEach((name, index) => {
                csvContent += `${index + 1},${name}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "報名名單.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
