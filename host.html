<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>抽獎大螢幕</title>
</head>

<body>
    <h1>活動主控台</h1>
    <h2>目前報名名單：</h2>
    <ul id="nameList"></ul>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // ⚠️ 一樣，把這裡替換成你的 firebaseConfig
        const firebaseConfig = {
            apiKey: "AIzaSyAFDgexiZg7b3V99OKD8kMN-AX0VnE3Zbk",
            authDomain: "lottery-cd2d6.firebaseapp.com",
            databaseURL: "https://lottery-cd2d6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lottery-cd2d6",
            storageBucket: "lottery-cd2d6.firebasestorage.app",
            messagingSenderId: "424550291907",
            appId: "1:424550291907:web:d53de4e7b528a0d3d80576"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const nameList = document.getElementById('nameList');

        // 監聽 "participants" 節點，如果有新增資料，就觸發這個函數
        db.ref("participants").on("child_added", function (snapshot) {
            const data = snapshot.val();
            // 建立一個 <li> 標籤，把名字放進去，並加到畫面上
            const li = document.createElement("li");
            li.innerText = data.name;
            nameList.appendChild(li);
        });
    </script>
</body>

</html>
