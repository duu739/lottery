<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>活動報名</title>
    <style>
        /* --- 專屬莫蘭迪配色 --- */
        :root {
            --c-red: #F05C5D;
            --c-red-shade: #D33D3E;
            --c-teal: #336B87; 
            --c-teal-shade: #1F4A60;
            --c-beige: #EAD2B6;
            --c-beige-tint: #F4E8DB;
            --c-blue: #709CB5;
        }

        body { 
            font-family: '微軟正黑體', sans-serif; 
            background: linear-gradient(135deg, var(--c-teal-shade) 0%, var(--c-teal) 100%); 
            color: var(--c-beige-tint); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
        }

        .join-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(234, 210, 182, 0.2); 
            border-radius: 20px; 
            padding: 40px 30px; 
            width: 85%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); 
        }

        h2 { color: var(--c-beige); margin-top: 0; font-size: 1.8rem; margin-bottom: 10px; }
        p.subtitle { color: var(--c-blue); margin-bottom: 20px; font-size: 0.95rem; }
        
        input[type="text"] { 
            width: 100%; box-sizing: border-box; padding: 15px; font-size: 1.2rem; 
            border-radius: 10px; border: 2px solid rgba(112, 156, 181, 0.3); 
            background: rgba(31, 74, 96, 0.5); color: #ffffff; 
            margin-bottom: 15px; text-align: center; transition: border-color 0.3s; 
        }
        input[type="text"]:focus { outline: none; border-color: var(--c-beige); background: rgba(31, 74, 96, 0.8); }
        input:read-only { background: rgba(0, 0, 0, 0.2); border-color: transparent; color: var(--c-beige); font-weight: bold; }
        input::placeholder { color: rgba(244, 232, 219, 0.4); }
        
        button { 
            width: 100%; background-color: var(--c-beige); color: var(--c-teal-shade); 
            border: none; padding: 15px; font-size: 1.2rem; font-weight: bold; 
            border-radius: 10px; cursor: pointer; transition: all 0.3s; 
        }
        button:active { transform: scale(0.96); }
        button:disabled { background-color: var(--c-blue); color: rgba(255,255,255,0.5); cursor: not-allowed; transform: none; }
        
        #message { margin-top: 20px; font-weight: bold; font-size: 1.1rem; min-height: 24px; }
        .success-text { color: var(--c-beige); } 
        .error-text { color: var(--c-red); }
    </style>
</head>
<body>

    <div class="join-card">
        <h2>🎉 歡迎參加抽獎</h2>
        <p class="subtitle">請確認活動代碼並輸入姓名</p>
        
        <input type="text" id="roomCodeInput" placeholder="請輸入活動代碼" autocomplete="off">
        <input type="text" id="nameInput" placeholder="請輸入您的姓名" autocomplete="off">
        
        <button id="submitBtn">送出報名</button>
        <p id="message"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAFDgexiZg7b3V99OKD8kMN-AX0VnE3Zbk",
            authDomain: "lottery-cd2d6.firebaseapp.com",
            databaseURL: "https://lottery-cd2d6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lottery-cd2d6",
            storageBucket: "lottery-cd2d6.firebasestorage.app",
            messagingSenderId: "424550291907",
            appId: "1:424550291907:web:d53de4e7b528a0d3d80576"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const submitBtn = document.getElementById('submitBtn');
        const roomInput = document.getElementById('roomCodeInput');
        const nameInput = document.getElementById('nameInput');
        const messageEl = document.getElementById('message');

        const urlParams = new URLSearchParams(window.location.search);
        let roomFromUrl = urlParams.get('room');

        // 如果網址有自帶代碼，填入並鎖定，不再檢查 localStorage
        if (roomFromUrl) {
            roomInput.value = roomFromUrl;
            roomInput.readOnly = true;
        }

        submitBtn.addEventListener('click', function() {
            const roomCode = roomInput.value.trim();
            const name = nameInput.value.trim();
            
            if (!roomCode || !name) {
                messageEl.innerText = "⚠️ 代碼和名字都不能空白喔！";
                messageEl.className = "error-text";
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "資料檢查中...";
            messageEl.innerText = "";

            const eventRef = db.ref(`events/${roomCode}/participants`);

            eventRef.once("value").then((snapshot) => {
                let isDuplicate = false;
                snapshot.forEach((childSnapshot) => {
                    if (childSnapshot.val().name === name) isDuplicate = true;
                });

                if (isDuplicate) {
                    messageEl.innerText = "⚠️ 報名失敗：這個名字已經有人用過囉！";
                    messageEl.className = "error-text";
                    submitBtn.disabled = false;
                    submitBtn.innerText = "重新送出";
                } else {
                    eventRef.push({
                        name: name,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    }).then(() => {
                        // ✨ 這裡改變了：不隱藏輸入框，只清空名字欄位，方便代填下一個
                        messageEl.innerText = `✅ 「${name}」報名成功！可繼續填寫下一位。`;
                        messageEl.className = "success-text";
                        nameInput.value = ""; // 清空名字輸入框
                        submitBtn.disabled = false; // 恢復按鈕可點擊
                        submitBtn.innerText = "送出報名";
                        // 移除 localStorage 的寫入限制
                    }).catch((error) => {
                        messageEl.innerText = "❌ 發生錯誤，請稍後再試";
                        messageEl.className = "error-text";
                        submitBtn.disabled = false;
                        submitBtn.innerText = "重新送出";
                    });
                }
            });
        });

        nameInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") { event.preventDefault(); submitBtn.click(); }
        });
    </script>
</body>
</html>
